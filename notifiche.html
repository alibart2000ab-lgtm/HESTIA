<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>Hestia — Notifiche</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: var(--font-family-base);
    color: var(--color-text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .screen {
    background: var(--color-bg-canvas);
    padding-bottom: 108px;
  }

  .h1 { font-size: var(--font-h1-size); line-height: var(--font-h1-lh); font-weight: var(--font-h1-weight); }
  .h2 { font-size: var(--font-h2-size); line-height: var(--font-h2-lh); font-weight: var(--font-h2-weight); }
  .h4 { font-size: var(--font-h4-size); line-height: var(--font-h4-lh); font-weight: var(--font-h4-weight); }
  .body-md { font-size: var(--font-body-md-size); line-height: var(--font-body-md-lh); font-weight: var(--font-body-md-weight); }
  .body-sm { font-size: var(--font-body-sm-size); line-height: var(--font-body-sm-lh); font-weight: var(--font-body-sm-weight); }
  .label { font-size: var(--font-label-size); line-height: var(--font-label-lh); font-weight: var(--font-label-weight); }
  .text-secondary { color: var(--color-text-secondary); }

  .icon { display: inline-block; flex-shrink: 0; }
  .icon svg { display: block; width: 100%; height: 100%; }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--spacing-lg) var(--spacing-lg) var(--spacing-md);
  }
  .icon-btn {
    width: 44px; height: 44px;
    border-radius: var(--radius-full);
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border-default);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-primary);
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
  }
  .icon-btn .icon { width: 20px; height: 20px; }

  .page-title { padding: 0 var(--spacing-lg); margin-bottom: var(--spacing-md); }

  /* ---------- Filter chips ---------- */
  .chip-row {
    display: flex;
    gap: var(--spacing-sm);
    padding: 0 var(--spacing-lg);
    margin-bottom: var(--spacing-lg);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 10px 20px;
    border-radius: var(--radius-full);
    border: 1px solid transparent;
    background: var(--color-bg-subtle);
    color: var(--color-text-secondary);
    font-family: var(--font-family-base);
    font-size: var(--font-label-size);
    font-weight: 500;
    cursor: pointer;
  }
  .chip.active {
    background: var(--color-bg-surface);
    border-color: var(--color-text-primary);
    color: var(--color-text-primary);
    font-weight: 600;
  }

  .section { padding: 0 var(--spacing-lg); }

  /* ---------- Reward hero card ---------- */
  .reward-card {
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    padding: var(--spacing-xl) var(--spacing-lg);
    margin-bottom: var(--spacing-md);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .reward-illustration { width: 150px; height: auto; margin-bottom: var(--spacing-md); }
  .reward-name { color: var(--color-text-primary); margin-bottom: var(--spacing-xs); }
  .reward-stat { color: var(--color-action-primary-default); margin-bottom: var(--spacing-xs); }
  .reward-substat { color: var(--color-text-secondary); margin-bottom: var(--spacing-md); }
  .reward-caption { color: var(--color-text-secondary); max-width: 320px; }

  /* ---------- Notification list items ---------- */
  .notif-item {
    display: flex;
    align-items: flex-start;
    gap: var(--spacing-md);
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    padding: var(--spacing-md) var(--spacing-lg);
    margin-bottom: var(--spacing-md);
  }
  .notif-icon-badge {
    width: 40px; height: 40px;
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .notif-icon-badge .icon { width: 20px; height: 20px; }
  .notif-icon-badge.tint-reward { background: var(--color-lime-1); }
  .notif-icon-badge.tint-reward .icon { color: var(--color-lime-3); }
  .notif-icon-badge.tint-info { background: var(--color-blue-1); }
  .notif-icon-badge.tint-info .icon { color: var(--color-blue-3); }
  .notif-icon-badge.tint-tips { background: var(--color-purple-1); }
  .notif-icon-badge.tint-tips .icon { color: var(--color-purple-3); }
  .notif-body { flex: 1; min-width: 0; }
  .notif-title { color: var(--color-text-primary); }
  .notif-desc { color: var(--color-text-secondary); margin-top: 2px; }
  .notif-time { color: var(--color-text-secondary); margin-top: 6px; display: block; }

  .empty-state { padding: var(--spacing-xl) 0; text-align: center; color: var(--color-text-secondary); }

  /* ---------- Bottom nav ---------- */
  .bottom-nav {
    background: var(--color-bg-surface);
    border-top: 1px solid var(--color-border-default);
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: var(--spacing-sm) var(--spacing-lg) var(--spacing-md);
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-decoration: none;
    color: var(--color-text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-family-base);
  }
  .nav-item .icon { width: 24px; height: 24px; }
  .nav-item span { font-size: var(--font-body-sm-size); font-weight: 500; }
  .nav-item.active { color: var(--color-text-primary); }
  .nav-item.active .icon { color: var(--color-text-primary); }
  .nav-item.ai { margin-top: -34px; }
  .nav-item.ai .ai-circle {
    width: 56px; height: 56px;
    border-radius: var(--radius-full);
    background: var(--color-action-primary-default);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-md);
  }
  .nav-item.ai .ai-circle .icon { width: 26px; height: 26px; color: var(--color-white); }
  .nav-item.ai span { color: var(--color-text-primary); margin-top: 2px; }
</style>

      </span>
    </div>

<div class="screen">

  <header class="header">
    <a class="icon-btn" href="home.html" aria-label="Torna alla home">

<script>
  const ICONS = {
    leaf: '<path d="M5 21c0-9 6-16 16-16 0 10-7 16-16 16z"/><path d="M5 21c3-5 7-9 12-12"/>',
    info: '<circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="7.5" r="0.75" fill="currentColor" stroke="none"/>',
    bulb: '<path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/>'
  };
  function iconSvg(key) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[key] || ICONS.info) + '</svg>';
  }

  const categories = [
    {
      key: 'reward',
      label: 'Reward',
      tint: 'reward',
      icon: 'leaf',
      hero: {
        co2: '~320 g',
        equivalent: 'equivalente a 2 sacchetti di plastica in meno',
        caption: 'Continua così: piccole abitudini come questa, ripetute ogni giorno, fanno una grande differenza nel tempo.'
      },
      items: [
        { title: 'Hai alzato le tapparelle alle 10:05', desc: 'Sfruttando la luce naturale in soggiorno invece delle luci artificiali.', time: 'Oggi, 10:05' },
        { title: 'Il termostato si è abbassato di notte', desc: 'Riducendo i consumi di riscaldamento mentre dormivi.', time: 'Ieri, 23:00' },
        { title: 'La moka intelligente si è spenta da sola', desc: 'Evitando sprechi di energia dopo la preparazione del caffè.', time: 'Ieri, 10:12' }
      ]
    },
    {
      key: 'info',
      label: 'Info',
      tint: 'info',
      icon: 'info',
      items: [
        { title: 'Nuovo aggiornamento disponibile', desc: 'Hestia si aggiorna con nuove funzionalità per il risparmio energetico.', time: 'Oggi, 08:30' },
        { title: 'Manutenzione programmata', desc: 'L\'aspirapolvere robot pulirà i filtri questa notte alle 02:00.', time: 'Ieri, 19:45' },
        { title: 'Nuovo scenario disponibile', desc: 'Prova lo scenario "Fuori casa" per ottimizzare i consumi quando sei via.', time: '2 giorni fa' }
      ]
    },
    {
      key: 'tips',
      label: 'Tips',
      tint: 'tips',
      icon: 'bulb',
      items: [
        { title: 'Abbassa il termostato di 1°C', desc: 'Puoi risparmiare fino al 6% sui consumi di riscaldamento.', time: 'Suggerimento' },
        { title: 'Usa la modalità Eco la sera', desc: 'Riduce automaticamente luci e stand-by dei dispositivi.', time: 'Suggerimento' },
        { title: 'Chiudi le tapparelle nelle ore più calde', desc: 'Mantieni la casa fresca senza usare il condizionatore.', time: 'Suggerimento' }
      ]
    }
  ];

  const chipRow = document.getElementById('chip-row');
  const content = document.getElementById('content');
  let active = 'reward';

  function renderChips() {
    chipRow.innerHTML = '';
    categories.forEach(function (c) {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip' + (c.key === active ? ' active' : '');
      chip.textContent = c.label;
      chip.addEventListener('click', function () {
        active = c.key;
        renderChips();
        renderContent();
      });
      chipRow.appendChild(chip);
    });
  }

  function renderContent() {
    const cat = categories.find(function (c) { return c.key === active; });
    content.innerHTML = '';

    if (cat.hero) {
      const hero = document.createElement('div');
      hero.className = 'reward-card';
      hero.innerHTML =
        '<img class="reward-illustration" src="illustrazioni/Green living supporter displaying leaf sprout promoting nature care.png" alt="Illustrazione: persona con una piantina">' +
        '<div class="h4 reward-name">Bravissima Sara</div>' +
        '<div class="h2 reward-stat">' + cat.hero.co2 + ' di CO<sub>2</sub> non emessi</div>' +
        '<div class="body-md reward-substat">' + cat.hero.equivalent + '</div>' +
        '<div class="body-sm reward-caption">' + cat.hero.caption + '</div>';
      content.appendChild(hero);
    }

    if (!cat.items || cat.items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state body-md';
      empty.textContent = 'Nessuna notifica in questa categoria per ora.';
      content.appendChild(empty);
      return;
    }

    cat.items.forEach(function (item) {
      const el = document.createElement('div');
      el.className = 'notif-item';
      el.innerHTML =
        '<span class="notif-icon-badge tint-' + cat.tint + '"><span class="icon">' + iconSvg(cat.icon) + '</span></span>' +
        '<div class="notif-body">' +
        '<div class="label notif-title">' + item.title + '</div>' +
        '<div class="body-md notif-desc">' + item.desc + '</div>' +
        '<span class="body-sm notif-time">' + item.time + '</span>' +
        '</div>';
      content.appendChild(el);
    });
  }

  renderChips();
  renderContent();
</script>
</body>
