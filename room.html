<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: var(--font-family-base);
    color: var(--color-text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .screen {
    background: var(--color-bg-canvas);
    padding-bottom: var(--spacing-lg);
  }

  .h1 { font-size: var(--font-h1-size); line-height: var(--font-h1-lh); font-weight: var(--font-h1-weight); }
  .h4 { font-size: var(--font-h4-size); line-height: var(--font-h4-lh); font-weight: var(--font-h4-weight); }
  .body-md { font-size: var(--font-body-md-size); line-height: var(--font-body-md-lh); font-weight: var(--font-body-md-weight); }
  .body-sm { font-size: var(--font-body-sm-size); line-height: var(--font-body-sm-lh); font-weight: var(--font-body-sm-weight); }
  .label { font-size: var(--font-label-size); line-height: var(--font-label-lh); font-weight: var(--font-label-weight); }
  .text-secondary { color: var(--color-text-secondary); }

  .icon { display: inline-block; flex-shrink: 0; }
  .icon svg { display: block; width: 100%; height: 100%; }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--spacing-md);
    padding: var(--spacing-lg) var(--spacing-lg) var(--spacing-md);
  }
  .avatar-btn {
    width: 44px; height: 44px;
    border-radius: var(--radius-full);
    background: var(--color-orange-4);
    border: none;
    display: flex; align-items: center; justify-content: center;
    color: var(--color-white);
    cursor: pointer;
    flex-shrink: 0;
  }
  .avatar-btn .icon { width: 22px; height: 22px; }

  .section { padding: 0 var(--spacing-lg); margin-top: var(--spacing-lg); }
  .section-title {
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-secondary);
    margin-bottom: var(--spacing-md);
  }

  /* ---------- Floor plan crop ---------- */
  .floorplan-wrap svg { display: block; width: 100%; height: auto; }
  .furniture { fill: none; stroke: var(--color-grey-4); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .wall { fill: none; stroke: #2B2B2B; stroke-linecap: square; }

  /* ---------- Device grid ---------- */
  .device-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-md);
  }
  .device-card {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-lg);
    background: var(--color-bg-subtle);
    box-shadow: var(--shadow-sm);
    padding: var(--spacing-md);
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    min-height: 80px;
    cursor: pointer;
    text-align: left;
    font-family: var(--font-family-base);
    -webkit-tap-highlight-color: transparent;
  }
  .device-card:disabled,
  .device-card.info { cursor: default; }
  .device-card.slider {
    cursor: ew-resize;
    touch-action: pan-y;
    -webkit-user-select: none;
    user-select: none;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
  }
  .device-card .fill-bar {
    position: absolute;
    inset: 0;
    width: 0%;
    background: var(--color-orange-3);
    z-index: 0;
    pointer-events: none;
  }
  .device-card .device-icon-wrap,
  .device-card .device-info { position: relative; z-index: 1; }
  .device-icon-wrap {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-primary);
    flex-shrink: 0;
  }
  .device-info { min-width: 0; }
  .device-name { color: var(--color-text-primary); display: block; }
  .device-status { color: var(--color-text-secondary); margin-top: 2px; display: block; }

</style>
</head>

<script>
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room') || 'cucina';
  const name = params.get('name') || 'Cucina';

  const roomMeta = {
    soggiorno: { preposition: 'in soggiorno', viewBox: '0 0 280 360' },
    cucina: { preposition: 'in cucina', viewBox: '260 0 168 360' },
    bagno: { preposition: 'in bagno', viewBox: '410 0 140 200' },
    camera: { preposition: 'in camera da letto', viewBox: '530 0 230 360' }
  };
  const meta = roomMeta[room] || roomMeta.cucina;

  document.getElementById('room-title').textContent = 'Sara, sei ' + meta.preposition;
  document.getElementById('room-svg').setAttribute('viewBox', meta.viewBox);

  /* ---------- icon paths (stroke-based, matches Hestia icon set) ---------- */
  const ICONS = {
    light: '<path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/>',
    blinds: '<rect x="4" y="3" width="16" height="18" rx="1"/><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="13" x2="20" y2="13"/><line x1="4" y1="18" x2="20" y2="18"/>',
    speaker: '<rect x="6" y="2" width="12" height="20" rx="3"/><circle cx="12" cy="9" r="3"/><circle cx="12" cy="17" r="1.4"/>',
    temp: '<path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>',
    tv: '<rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/>',
    fan: '<path d="M12 12c0-4 2-7 5-7s3 4 0 6-5 1-5 1z"/><path d="M12 12c-4 0-7-2-7-5s4-3 6 0 1 5 1 5z"/><path d="M12 12c0 4-2 7-5 7s-3-4 0-6 5-1 5-1z"/><path d="M12 12c4 0 7 2 7 5s-4 3-6 0-1-5-1-5z"/><circle cx="12" cy="12" r="1.5"/>',
    plug: '<path d="M9 2v6"/><path d="M15 2v6"/><path d="M6 8h12v4a6 6 0 0 1-12 0V8z"/><path d="M12 18v4"/>',
    lock: '<rect x="4" y="11" width="16" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
    camera: '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
    humidity: '<path d="M12 2s7 8.5 7 13a7 7 0 0 1-14 0c0-4.5 7-13 7-13z"/>',
    oven: '<rect x="3" y="4" width="18" height="17" rx="2"/><rect x="6" y="11" width="12" height="7" rx="1"/><circle cx="7" cy="7.5" r="1"/><circle cx="11" cy="7.5" r="1"/><circle cx="15" cy="7.5" r="1"/>',
    coffee: '<path d="M4 8h13v6a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8z"/><path d="M17 9.5h1.5a2.5 2.5 0 0 1 0 5H17"/><path d="M8 2.5c0 1-1 1-1 2s1 1 1 2"/><path d="M12 2.5c0 1-1 1-1 2s1 1 1 2"/>'
  };

  function iconSvg(key) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[key] || ICONS.light) + '</svg>';
  }

  /* ---------- per-room device catalog ----------
     type "slider" = drag-to-set fill (light brightness, blinds openness, temperature) */
  const roomDevices = {
    soggiorno: [
      { name: 'Luce soffitto', icon: 'light', type: 'slider', unit: '%', min: 0, max: 100, value: 70 },
      { name: 'Tapparelle', icon: 'blinds', type: 'slider', unit: '%', min: 0, max: 100, value: 60 },
      { name: 'TV', icon: 'tv', type: 'toggle', on: false },
      { name: 'Speaker smart', icon: 'speaker', type: 'toggle', on: false },
      { name: 'Termostato', icon: 'temp', type: 'slider', unit: '°C', min: 16, max: 26, value: 21 },
      { name: 'Telecamera', icon: 'camera', type: 'toggle', on: true, onLabel: 'Attiva', offLabel: 'Disattivata' }
    ],
    cucina: [
      { name: 'Tapparella', icon: 'blinds', type: 'slider', unit: '%', min: 0, max: 100, value: 20 },
      { name: 'Luce lavabo', icon: 'light', type: 'slider', unit: '%', min: 0, max: 100, value: 0 },
      { name: 'TV', icon: 'tv', type: 'slider', unit: '%', min: 0, max: 100, value: 75, onPrefix: true },
      { name: 'Forno', icon: 'oven', type: 'toggle', on: true },
      { name: 'Cappa', icon: 'fan', type: 'slider', unit: '%', min: 0, max: 100, value: 75, onPrefix: true },
      { name: 'Caffè', icon: 'coffee', type: 'toggle', on: false }
    ],
    bagno: [
      { name: 'Luce specchio', icon: 'light', type: 'slider', unit: '%', min: 0, max: 100, value: 60 },
      { name: 'Scaldasalviette', icon: 'temp', type: 'slider', unit: '°C', min: 16, max: 26, value: 20 },
      { name: 'Ventola', icon: 'fan', type: 'toggle', on: false },
      { name: 'Sensore umidità', icon: 'humidity', type: 'info', value: '48%' }
    ],
    camera: [
      { name: 'Luce comodino', icon: 'light', type: 'slider', unit: '%', min: 0, max: 100, value: 0 },
      { name: 'Tapparelle', icon: 'blinds', type: 'slider', unit: '%', min: 0, max: 100, value: 0 },
      { name: 'Termostato', icon: 'temp', type: 'slider', unit: '°C', min: 16, max: 26, value: 19 },
      { name: 'Serratura porta', icon: 'lock', type: 'toggle', on: true, onLabel: 'Bloccata', offLabel: 'Sbloccata' },
      { name: 'Speaker', icon: 'speaker', type: 'toggle', on: false }
    ]
  };

  const devices = roomDevices[room] || roomDevices.cucina;
  const grid = document.getElementById('device-grid');

  function sliderStatusText(d) {
    if (d.unit === '%') {
      if (d.value === 0) return 'Off';
      return d.onPrefix ? 'On · ' + d.value + '%' : d.value + '%';
    }
    return d.value + d.unit;
  }

  function fillPct(d) {
    if (d.type === 'slider') return sliderPct(d);
    if (d.type === 'toggle') return d.on ? 100 : 0;
    return 0;
  }

  function sliderPct(d) {
    return ((d.value - d.min) / (d.max - d.min)) * 100;
  }

  /* Attaches drag-to-set behaviour to a slider card. Updates the DOM directly
     (no full re-render) so dragging stays smooth at 60fps. */
  function attachSlider(card, fillBar, statusEl, d) {
    let dragging = false;

    function setFromClientX(clientX) {
      const rect = card.getBoundingClientRect();
      let pct = (clientX - rect.left) / rect.width;
      pct = Math.max(0, Math.min(1, pct));
      const raw = d.min + pct * (d.max - d.min);
      const step = d.unit === '%' ? 5 : 1;
      d.value = Math.round(raw / step) * step;
      d.value = Math.max(d.min, Math.min(d.max, d.value));
      fillBar.style.width = sliderPct(d) + '%';
      statusEl.textContent = sliderStatusText(d);
    }

    card.addEventListener('pointerdown', function (e) {
      dragging = true;
      card.setPointerCapture(e.pointerId);
      setFromClientX(e.clientX);
    });
    card.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      setFromClientX(e.clientX);
    });
    function stop(e) {
      if (!dragging) return;
      dragging = false;
      try { card.releasePointerCapture(e.pointerId); } catch (err) {}
    }
    card.addEventListener('pointerup', stop);
    card.addEventListener('pointercancel', stop);
  }

  function render() {
    grid.innerHTML = '';
    devices.forEach(function (d) {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'device-card' + (d.type === 'info' ? ' info' : '') + (d.type === 'slider' ? ' slider' : '');

      let statusText = '';
      if (d.type === 'toggle') {
        statusText = d.on ? (d.onLabel || 'On') : (d.offLabel || 'Off');
      } else if (d.type === 'slider') {
        statusText = sliderStatusText(d);
      } else if (d.type === 'info') {
        statusText = d.value;
      }

      card.innerHTML =
        (d.type !== 'info' ? '<span class="fill-bar" style="width:' + fillPct(d) + '%"></span>' : '') +
        '<span class="device-icon-wrap icon">' + iconSvg(d.icon) + '</span>' +
        '<span class="device-info">' +
        '<span class="label device-name">' + d.name + '</span>' +
        '<span class="body-sm device-status">' + statusText + '</span>' +
        '</span>';

      if (d.type === 'toggle') {
        card.addEventListener('click', function () {
          d.on = !d.on;
          render();
        });
      } else if (d.type === 'slider') {
        const fillBar = card.querySelector('.fill-bar');
        const statusEl = card.querySelector('.device-status');
        attachSlider(card, fillBar, statusEl, d);
      }

      grid.appendChild(card);
    });
  }

  render();
</script>
</body>
